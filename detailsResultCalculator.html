<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Result Calculator</title>

    <style>
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --bg-light: #f6f8fb;
            --text-dark: #333;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: clamp(15px, 5vw, 30px); /* Fluid padding */
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: var(--text-dark);
            font-size: clamp(1.2rem, 5vw, 1.6rem);
        }

        .exam-container {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 8px;
            background: #fafafa;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #555;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px; /* Prevents iOS auto-zoom on focus */
            width: 100%;
        }

        /* Responsive Breakpoint for Mobile */
        @media (max-width: 400px) {
            .row {
                flex-direction: column;
            }
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }

        button:hover {
            background: #2d8cf0;
        }

        .result {
            margin-top: 25px;
            background: var(--bg-light);
            padding: 20px;
            border-radius: 10px;
            font-size: 15px;
            line-height: 1.8;
            border-left: 4px solid var(--primary);
        }

        .result span {
            font-weight: bold;
            color: #2d8cf0;
            float: right;
        }

        .final-row {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #ddd;
            font-size: 18px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Result Calculator</h2>

    <div class="exam-container">
        <label>1st Unit Test</label>
        <div class="row">
            <input type="number" id="u1" placeholder="Marks Obtained">
            <input type="number" id="u1t" placeholder="Max Marks">
        </div>
    </div>

    <div class="exam-container">
        <label>2nd Unit Test</label>
        <div class="row">
            <input type="number" id="u2" placeholder="Marks Obtained">
            <input type="number" id="u2t" placeholder="Max Marks">
        </div>
    </div>

    <div class="exam-container">
        <label>Half Yearly (30%)</label>
        <div class="row">
            <input type="number" id="half" placeholder="Marks Obtained">
            <input type="number" id="halft" placeholder="Max Marks">
        </div>
    </div>

    <div class="exam-container">
        <label>Annual (50%)</label>
        <div class="row">
            <input type="number" id="annual" placeholder="Marks Obtained">
            <input type="number" id="annualt" placeholder="Max Marks">
        </div>
    </div>

    <button onclick="calculate()">Calculate Result</button>

    <div class="result" id="result" style="display:none;">
        </div>
</div>

<script>
function calculate(){
    let u1 = parseFloat(document.getElementById("u1").value) || 0;
    let u1t = parseFloat(document.getElementById("u1t").value) || 1;
    let u2 = parseFloat(document.getElementById("u2").value) || 0;
    let u2t = parseFloat(document.getElementById("u2t").value) || 1;
    let half = parseFloat(document.getElementById("half").value) || 0;
    let halft = parseFloat(document.getElementById("halft").value) || 1;
    let annual = parseFloat(document.getElementById("annual").value) || 0;
    let annualt = parseFloat(document.getElementById("annualt").value) || 1;

    let unitMarks = u1 + u2;
    let unitTotal = u1t + u2t;

    let p20 = (unitMarks * 0.20);
    let p30 = (half * 0.30);
    let p50 = (annual * 0.50);

    let obtained = p20 + p30 + p50;
    let full = (unitTotal * 0.20) + (halft * 0.30) + (annualt * 0.50);
    let final = ((obtained / full) * 100).toFixed(2);

    let resultDiv = document.getElementById("result");
    resultDiv.style.display = "block";
   let grandTotal = p20 + p30 + p50;

resultDiv.innerHTML = 
"20% Unit Tests: <span>" + p20.toFixed(2) + "</span><br>" +
"30% Half Yearly: <span>" + p30.toFixed(2) + "</span><br>" +
"50% Annual: <span>" + p50.toFixed(2) + "</span><br>" +
"Grand Total: <span>" + grandTotal.toFixed(2) + "</span><br>" +
"<div class='final-row'>Grand Percentage: <span>" + final + "%</span></div>";
}
</script>

</body>
</html>
