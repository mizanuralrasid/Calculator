<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multi-URL Embedder</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 50px 20px; 
            background: #f0f4f8; 
        }

        .button-container {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .fetch-btn {
            padding: 12px 25px;
            font-size: 0.95rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Distinct colors for different buttons */
        .btn-blue { background: #2563eb; }
        .btn-green { background: #10b981; }
        .btn-yellow { background: #b3b000; }

        .fetch-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        #embedBox {
            width: 90%;
            max-width: 1100px;
            height: 650px;
            background: white;
            border: 2px solid #cbd5e1;
            border-radius: 12px;
            display: none; 
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="button-container">
        <button class="fetch-btn btn-blue" onclick="loadContent('https://mizanuralrasid.github.io/Calculator/detailsResultCalculator.html')">
            Details Results Calculator
        </button>

        <button class="fetch-btn btn-green" onclick="loadContent('https://mizanuralrasid.github.io/Calculator/singleResultCalculator.html')">
            Single Results Calculator
        </button>

        <button class="fetch-btn btn-yellow" onclick="loadContent('https://mizanuralrasid.github.io/Calculator/PercentageSerializer.html')">
            Percentage Serializer
        </button>
    </div>

    <div id="embedBox">
        <iframe id="myFrame" src=""></iframe>
    </div>

    <script>
        function loadContent(url) {
            const box = document.getElementById('embedBox');
            const frame = document.getElementById('myFrame');

            // Set the dynamic URL passed from the button
            frame.src = url;
            
            // Show the box
            box.style.display = "block";
            
            // Smooth scroll to the box so the user sees the content
            box.scrollIntoView({ behavior: 'smooth' });
        }
    </script>

</body>
</html>
