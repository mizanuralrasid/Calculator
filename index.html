<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precise Grade Calculator</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #1a73e8; }
        .input-group { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .flex { display: flex; gap: 10px; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; }
        .weight-tag { font-size: 12px; color: #666; font-style: italic; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; background: #e8f0fe; display: none; text-align: center; }
        .big-pct { font-size: 32px; font-weight: bold; color: #1a73e8; margin: 5px 0; }
        .breakdown { font-size: 12px; color: #555; text-align: left; line-height: 1.6; }
    </style>
</head>
<body>

<div class="card">
    <h2>Weighted Result</h2>
    
    <div class="input-group">
        <label>1st Unit Test <span class="weight-tag">(10%)</span></label>
        <div class="flex">
            <input type="number" id="u1_s" value="245" placeholder="Score">
            <input type="number" id="u1_t" value="250" placeholder="Total">
        </div>
    </div>

    <div class="input-group">
        <label>2nd Unit Test <span class="weight-tag">(10%)</span></label>
        <div class="flex">
            <input type="number" id="u2_s" value="195" placeholder="Score">
            <input type="number" id="u2_t" value="250" placeholder="Total">
        </div>
    </div>

    <div class="input-group">
        <label>Half-Yearly <span class="weight-tag">(30%)</span></label>
        <div class="flex">
            <input type="number" id="hy_s" value="238" placeholder="Score">
            <input type="number" id="hy_t" value="250" placeholder="Total">
        </div>
    </div>

    <div class="input-group">
        <label>Annual Exam <span class="weight-tag">(50%)</span></label>
        <div class="flex">
            <input type="number" id="an_s" value="243" placeholder="Score">
            <input type="number" id="an_t" value="250" placeholder="Total">
        </div>
    </div>

    <button onclick="calculate()">Calculate Exact Percentage</button>

    <div id="result">
        <div>Final Weighted Grade:</div>
        <div class="big-pct" id="total_pct">0%</div>
        <div class="breakdown" id="breakdown"></div>
    </div>
</div>

<script>
    function calculate() {
        const getPoints = (sId, tId, weight) => {
            const s = parseFloat(document.getElementById(sId).value) || 0;
            const t = parseFloat(document.getElementById(tId).value) || 1;
            return (s / t) * weight;
        };

        const p1 = getPoints('u1_s', 'u1_t', 10);
        const p2 = getPoints('u2_s', 'u2_t', 10);
        const p3 = getPoints('hy_s', 'hy_t', 30);
        const p4 = getPoints('an_s', 'an_t', 50);

        const final = p1 + p2 + p3 + p4;

        document.getElementById('result').style.display = 'block';
        document.getElementById('total_pct').innerText = final.toFixed(2) + '%';
        
        document.getElementById('breakdown').innerHTML = `
            <b>Points Contribution:</b><br>
            Units: ${(p1 + p2).toFixed(2)} / 20<br>
            Half-Yearly: ${p3.toFixed(2)} / 30<br>
            Annual: ${p4.toFixed(2)} / 50
        `;
    }
</script>

</body>
              </html>
