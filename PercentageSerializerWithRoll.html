<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Roll Serializer</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --text: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px 20px; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 500px; }
        
        h2 { margin-bottom: 1.5rem; font-size: 1.25rem; color: #1e293b; text-align: center; }
        
        .input-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .field { flex: 1; }
        label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; color: #94a3b8; }
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 1rem; transition: border-color 0.2s; }
        input:focus { border-color: var(--primary); outline: none; }

        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1rem; }
        button:hover { background: #4f46e5; }

        table { width: 100%; margin-top: 30px; border-collapse: separate; border-spacing: 0 8px; }
        th { text-align: left; padding: 10px; font-size: 0.8rem; color: #64748b; }
        td { background: #fff; padding: 12px 10px; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
        tr td:first-child { border-left: 1px solid #f1f5f9; border-radius: 8px 0 0 8px; font-weight: bold; color: var(--primary); }
        tr td:last-child { border-right: 1px solid #f1f5f9; border-radius: 0 8px 8px 0; text-align: right; }
        
        .badge-new { background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 6px; font-weight: 600; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>Academic Serializer</h2>
    
    <div class="input-row">
        <div class="field">
            <label>Current/Old Roll</label>
            <input type="text" id="oldRoll" placeholder="Ex: 105">
        </div>
        <div class="field">
            <label>Percentage (%)</label>
            <input type="number" id="percInput" placeholder="Ex: 92">
        </div>
    </div>

    <button onclick="processData()">Add Student</button>

    <table id="resultTable" style="display: none;">
        <thead>
            <tr>
                <th>Rank</th>
                <th>Old Roll</th>
                <th>New Roll (Auto)</th>
                <th style="text-align: right;">Result</th>
            </tr>
        </thead>
        <tbody id="displayBody"></tbody>
    </table>
</div>

<script>
    let students = [];

    function processData() {
        const oldInput = document.getElementById('oldRoll');
        const percInput = document.getElementById('percInput');
        
        const oldRoll = oldInput.value.trim();
        const percentage = parseFloat(percInput.value);

        if (!oldRoll || isNaN(percentage)) {
            alert("Please enter both Roll and Percentage.");
            return;
        }

        // 1. Add new record
        students.push({ oldRoll, percentage });

        // 2. Sort by percentage (Highest first)
        students.sort((a, b) => b.percentage - a.percentage);

        // 3. Render and Auto-assign New Roll
        render();

        // 4. Clear & Focus
        oldInput.value = '';
        percInput.value = '';
        oldInput.focus();
    }

    function render() {
        const table = document.getElementById('resultTable');
        const tbody = document.getElementById('displayBody');
        
        table.style.display = "table";
        
        // We use the 'index + 1' as the New Roll Number
        tbody.innerHTML = students.map((s, index) => `
            <tr>
                <td>#${index + 1}</td>
                <td>${s.oldRoll}</td>
                <td><span class="badge-new">Roll-${index + 1}</span></td>
                <td style="text-align: right;">${s.percentage}%</td>
            </tr>
        `).join('');
    }
</script>

</body>
</html>
